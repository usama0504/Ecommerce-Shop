    <script>
  // Page load hone se fouri pehle check karein taake flicker/glitch na ho
  if (localStorage.getItem('dark_mode') === 'true') {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }
</script>
